<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="CLWiki 是一个记录 Codex 使用经历、教程和实践方法的静态知识库。"
    />
    <title>CLWiki - Codex 使用经验知识库</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#article">跳到正文</a>

    <header class="site-header">
      <a class="brand" href="#top" aria-label="CLWiki">CLWiki</a>
      <nav class="top-nav" aria-label="主导航">
        <a href="#articles" aria-current="page">文章</a>
        <a href="https://api.boyabook.club" target="_blank" rel="noreferrer">BoyaAPI</a>
      </nav>
      <a class="github-link" id="githubLink" href="https://github.com/" target="_blank" rel="noreferrer">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            d="M12 2C6.48 2 2 6.59 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.09.68-.22.68-.49v-1.9c-2.78.62-3.37-1.22-3.37-1.22-.45-1.19-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.36 1.12 2.93.86.09-.67.35-1.12.64-1.38-2.22-.26-4.55-1.14-4.55-5.08 0-1.12.39-2.04 1.03-2.76-.1-.26-.45-1.31.1-2.72 0 0 .84-.28 2.75 1.05A9.28 9.28 0 0 1 12 6.93c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.46.1 2.72.64.72 1.03 1.64 1.03 2.76 0 3.95-2.34 4.82-4.57 5.08.36.32.68.94.68 1.9v2.81c0 .27.18.59.69.49A10.12 10.12 0 0 0 22 12.25C22 6.59 17.52 2 12 2Z"
          />
        </svg>
        GitHub
      </a>
      <button class="menu-button" id="menuButton" type="button" aria-label="打开文章导航" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </header>

    <div class="mobile-scrim" id="mobileScrim" hidden></div>

    <div class="layout" id="top">
      <aside class="sidebar" id="sidebar" aria-label="文章导航">
        <div class="sidebar-inner">
          <div class="sidebar-title">文章导航</div>
          <label class="search-box">
            <span class="search-icon" aria-hidden="true"></span>
            <span class="sr-only">搜索文章标题</span>
            <input id="articleSearch" type="search" placeholder="搜索文章标题" autocomplete="off" />
            <kbd>/</kbd>
          </label>
          <nav class="article-nav" id="articles" aria-label="文章列表"></nav>
        </div>
      </aside>

      <main class="reader">
        <article class="article" id="article" aria-live="polite">
          <div class="loading-state">正在加载文章...</div>
        </article>
      </main>

      <aside class="toc-rail" aria-label="目录">
        <div class="toc-inner">
          <div class="toc-title">目录</div>
          <nav class="toc" id="toc"></nav>
        </div>
      </aside>
    </div>

    <footer class="site-footer" id="about">
      <div>
        <strong>CLWiki</strong>
        <span>Codex 使用经验知识库</span>
      </div>
    </footer>

    <script src="app.js" defer></script>
  </body>
</html>
